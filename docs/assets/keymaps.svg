<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1746" width="2000" height="1746" font-family="'JetBrains Mono','Fira Code','Cascadia Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="17">
<rect width="2000" height="1746" rx="44" fill="#10151c"/>
<g>
<rect x="72" y="72" width="900" height="560" rx="18" fill="#1b222c"/>
<rect x="457.6" y="49" width="128.9" height="46" rx="8" fill="#8fd0dd"/>
<text x="522.0" y="72" fill="#10151c" font-weight="700" text-anchor="middle" dominant-baseline="central">nvim</text>
<text x="116" y="155" fill="#657081" dominant-baseline="central">leader</text>
<text x="928" y="155" fill="#657081" text-anchor="end" dominant-baseline="central">&quot; &quot;</text>
<text x="116" y="193" fill="#dfe4ea" dominant-baseline="central">source current file</text>
<text x="928" y="193" fill="#f4f6f8" text-anchor="end" dominant-baseline="central">&lt;leader&gt; + &lt;leader&gt;</text>
<text x="116" y="231" fill="#dfe4ea" dominant-baseline="central">clear search highlight</text>
<text x="928" y="231" fill="#f4f6f8" text-anchor="end" dominant-baseline="central">Esc</text>
<text x="116" y="269" fill="#dfe4ea" dominant-baseline="central">diagnostics to loclist</text>
<text x="928" y="269" fill="#f4f6f8" text-anchor="end" dominant-baseline="central">&lt;leader&gt; + q</text>
<text x="116" y="307" fill="#dfe4ea" dominant-baseline="central">exit terminal mode</text>
<text x="928" y="307" fill="#f4f6f8" text-anchor="end" dominant-baseline="central">Esc Esc</text>
<text x="116" y="345" fill="#dfe4ea" dominant-baseline="central">move focus between windows</text>
<text x="928" y="345" fill="#f4f6f8" text-anchor="end" dominant-baseline="central">C-h/j/k/l</text>
<text x="116" y="383" fill="#dfe4ea" dominant-baseline="central">move selection down / up</text>
<text x="928" y="383" fill="#f4f6f8" text-anchor="end" dominant-baseline="central">J / K</text>
<text x="116" y="421" fill="#dfe4ea" dominant-baseline="central">join line, keep cursor</text>
<text x="928" y="421" fill="#f4f6f8" text-anchor="end" dominant-baseline="central">J</text>
<text x="116" y="459" fill="#dfe4ea" dominant-baseline="central">half page jump, centered</text>
<text x="928" y="459" fill="#f4f6f8" text-anchor="end" dominant-baseline="central">C-d / C-u</text>
<text x="116" y="497" fill="#dfe4ea" dominant-baseline="central">paste over, keep yank</text>
<text x="928" y="497" fill="#f4f6f8" text-anchor="end" dominant-baseline="central">&lt;leader&gt; + p</text>
<text x="116" y="535" fill="#dfe4ea" dominant-baseline="central">delete into void register</text>
<text x="928" y="535" fill="#f4f6f8" text-anchor="end" dominant-baseline="central">&lt;leader&gt; + d</text>
<text x="116" y="573" fill="#dfe4ea" dominant-baseline="central">replace word under cursor</text>
<text x="928" y="573" fill="#f4f6f8" text-anchor="end" dominant-baseline="central">&lt;leader&gt; + s</text>
</g>
